<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Site Completo</title>
    <link rel="stylesheet" href="exprova2.css">
</head>
<body>

    <!-- Cabeçalho -->
    <header>
        <h1 id="titulo">Meu Primeiro Site</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Sobre</a>
            <a href="#">Contato</a>
        </nav>
    </header>

    <!-- Conteúdo principal -->
    <main>

        <!-- Seção com imagens -->
        <section class="imagens">
            <h2>Galeria de Imagens</h2>
            <img src="https://via.placeholder.com/200" alt="Imagem 1">
            <img src="https://via.placeholder.com/200" alt="Imagem 2">
            <img src="https://via.placeholder.com/200" alt="Imagem 3">
        </section>

        <!-- Seção com links -->
        <section class="links">
            <h2>Links úteis</h2>
            <ul>
                <li><a href="https://www.google.com" target="_blank">Google</a></li>
                <li><a href="https://www.youtube.com" target="_blank">YouTube</a></li>
                <li><a href="https://www.github.com" target="_blank">GitHub</a></li>
            </ul>
        </section>

        <!-- Tabela -->
        <section>
            <h2>Tabela de Produtos</h2>
            <table>
                <tr>
                    <th>Produto</th>
                    <th>Preço</th>
                    <th>Quantidade</th>
                </tr>
                <tr>
                    <td>Notebook</td>
                    <td>R$ 3000</td>
                    <td>5</td>
                </tr>
                <tr>
                    <td>Mouse</td>
                    <td>R$ 50</td>
                    <td>20</td>
                </tr>
                <tr>
                    <td>Teclado</td>
                    <td>R$ 100</td>
                    <td>10</td>
                </tr>
            </table>
        </section>

    </main>

    <!-- Rodapé -->
    <footer>
        <p>© 2026 - Meu Site</p>
    </footer>

</body>
</html>
